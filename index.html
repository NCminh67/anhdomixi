<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>CHỘ NÀO</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Playfair+Display:ital,wght@1,400&family=Quicksand:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://i.pinimg.com/736x/bf/7c/df/bf7cdfccfb99951d3eb1754cf398f266.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #d4af37;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: crosshair;
        }

        /* Bụi tiên rơi */
        .dust { position: absolute; background: #fff; border-radius: 50%; opacity: 0.2; pointer-events: none; animation: drift linear infinite; }
        @keyframes drift { from { transform: translateY(-10vh) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

        /* Chữ Kanji nền */
        .bg-kanji { 
            position: absolute; 
            font-family: 'Ma Shan Zheng', cursive; 
            color: #8b0000; 
            opacity: 0; 
            font-size: 5rem; 
            z-index: 1; 
            transition: opacity 2s, transform 2s; 
            pointer-events: none; 
        }

        #content-wrapper { position: relative; z-index: 10; text-align: center; width: 85%; }

        .main-text { 
            font-family: 'Playfair Display', serif; 
            font-style: italic; 
            font-size: 2.2rem; 
            color: #ffffff; 
            opacity: 1; 
            transition: opacity 1s ease; 
            text-shadow: 0 0 15px rgba(255,255,255,0.3); 
        }

        .single-word { 
            font-family: 'Ma Shan Zheng', cursive; 
            font-size: 8rem; 
            color: #ff3333; 
            display: none; 
            animation: pulse 2s infinite; 
        }

        @keyframes pulse { 
            0% { transform: scale(1); opacity: 0.5; } 
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 20px #ff3333; } 
            100% { transform: scale(1); opacity: 0.5; } 
        }

        #music-btn { 
            position: fixed; top: 20px; right: 20px; z-index: 100; 
            font-size: 1.5rem; background: rgba(255,255,255,0.1); 
            padding: 10px; border-radius: 50%; cursor: pointer; 
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); 
        }

        .hint { position: fixed; bottom: 30px; font-size: 0.7rem; letter-spacing: 4px; color: #ccc; text-transform: uppercase; }
    </style>
</head>
<body>

    <audio id="mainMusic" loop preload="auto">
        <source src="https://files.catbox.moe/frbtnu.mp3" type="audio/mpeg">
    </audio>

    <audio id="vuMusic" preload="auto">
        <source src="https://files.catbox.moe/735n4c.mp3" type="audio/mpeg">
    </audio>
    
    <div id="music-btn">🔇</div>
    <div id="kanji-bg" class="bg-kanji"></div>

    <div id="content-wrapper">
        <div id="text" class="main-text">conchominhcong.</div>
        <div id="big-word" class="single-word"></div>
    </div>

    <div class="hint">  VUI CHỘ NÀO ( CICK )</div>

    <script>
        const mainMusic = document.getElementById('mainMusic');
        const vuMusic = document.getElementById('vuMusic');
        const musicBtn = document.getElementById('music-btn');
        const textDiv = document.getElementById('text');
        const bigWordDiv = document.getElementById('big-word');
        
        let isMuted = false;
        let hasInteracted = false;

        const MAIN_VOL = 0.3; 
        const VU_VOL = 1.0;  

        const quotes = [
            "Tày từ cha...", 
            "ALO MINH À MINH?", 
            "NÀ NÁ NA NA ANH MỘ HIHI.",
            "TRÀ TỪ TAY.", 
            "ĐỘ MIXI MẶC BIKINI NHẢY SKIBIDI.", 
            "TÀY CHỘ NÀO?.", 
            "ANH NÀO KHI GẶP ĐỐI MỀM.", 
            "KHÔ GÀ ĐÈ TEM ĂN HẾT VẪN CÒN THÒM THÈM."
        ];

        const bigWords = ["CHÓ", "ĐỘ", "TÀY", "KHÔ GÀ", "ALO MINH À"];
        const kanjis = ["岱", "自", "父", "何", "見", "哪"]; 

        // Hiệu ứng Kanji bay
        function showKanji() {
            const kanjiBg = document.getElementById('kanji-bg');
            kanjiBg.innerText = kanjis[Math.floor(Math.random() * kanjis.length)];
            kanjiBg.style.left = Math.random() * 80 + 'vw';
            kanjiBg.style.top = Math.random() * 80 + 'vh';
            kanjiBg.style.opacity = 0.2;
            kanjiBg.style.transform = `scale(${Math.random() * 2 + 1})`;
            
            setTimeout(() => { kanjiBg.style.opacity = 0; }, 3000);
        }
        setInterval(showKanji, 3000);

        // Bụi tiên
        function createDust() {
            const dust = document.createElement('div');
            dust.className = 'dust';
            const size = Math.random() * 3;
            dust.style.width = size + 'px'; 
            dust.style.height = size + 'px';
            dust.style.left = Math.random() * 100 + 'vw';
            dust.style.animationDuration = Math.random() * 7 + 5 + 's';
            document.body.appendChild(dust);
            setTimeout(() => dust.remove(), 10000);
        }
        setInterval(createDust, 150);

        // Xử lý Click màn hình
        document.body.onclick = () => {
            // Kích hoạt nhạc lần đầu
            if (!hasInteracted) {
                mainMusic.volume = MAIN_VOL;
                mainMusic.play();
                musicBtn.innerText = '🔊';
                hasInteracted = true;
            }

            // Hiệu ứng đổi chữ
            const isSingleWord = Math.random() > 0.6;
            textDiv.style.opacity = 0;
            bigWordDiv.style.display = 'none';

            setTimeout(() => {
                if (isSingleWord) {
                    const word = bigWords[Math.floor(Math.random() * bigWords.length)];
                    bigWordDiv.innerText = word;
                    bigWordDiv.style.display = 'block';

                    if (word === "ALO MINH À") {
                        mainMusic.volume = 0.05; 
                        vuMusic.volume = VU_VOL;
                        vuMusic.currentTime = 0;
                        vuMusic.play();
                        vuMusic.onended = () => { mainMusic.volume = MAIN_VOL; };
                    }
                } else {
                    textDiv.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                    textDiv.style.opacity = 1;
                }
            }, 300);
        };

        // Nút loa tắt/mở
        musicBtn.onclick = (e) => {
            e.stopPropagation();
            isMuted = !isMuted;
            mainMusic.muted = isMuted;
            vuMusic.muted = isMuted;
            musicBtn.innerText = isMuted ? '🔇' : '🔊';
        };
    </script>
</body>
</html>
